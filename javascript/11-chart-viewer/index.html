<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualizzatore di Funzioni</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />
    <style>
      main {
        padding-top: 2rem;
        padding-bottom: 2rem;
      }

      #chart {
        min-height: 420px;
        border: 1px solid var(--pico-muted-border-color);
        border-radius: 0.5rem;
        padding: 0.5rem;
      }

      #message {
        min-height: 1.5rem;
        color: var(--pico-del-color);
      }
    </style>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
  </head>
  <body>
    <main class="container">
      <h1>Visualizzatore di Funzioni</h1>

      <form id="controls" class="grid">
        <label>
          Funzione
          <select id="function-select" name="function">
            <option value="lineare">Retta</option>
            <option value="parabola">Parabola</option>
          </select>
        </label>

        <label>
          x min
          <input id="x-min" name="xMin" type="number" value="-10" step="1" />
        </label>

        <label>
          x max
          <input id="x-max" name="xMax" type="number" value="10" step="1" />
        </label>

        <label>
          passo
          <input id="x-step" name="xStep" type="number" value="1" step="0.1" min="0.1" />
        </label>
      </form>

      <section id="function-params" class="grid" aria-label="Parametri funzione"></section>

      <p id="message" role="status" aria-live="polite"></p>
      <section id="chart" aria-label="Grafico funzione"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
